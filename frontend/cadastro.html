<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produto - Lucas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Gerenciador de Produtos</h1>
            <nav>
                <a href="index.html">Listar Produtos</a>
                <a href="cadastro.html" class="active">Cadastrar Produto</a>
            </nav>
        </header>

        <main>
            <h2>Cadastrar Novo Produto</h2>

            <div id="mensagem" class="mensagem"></div>

            <form id="form-cadastro" class="form-cadastro">
                <div class="form-group">
                    <label for="nome">Nome do Produto: *</label>
                    <input type="text" id="nome" name="nome" required placeholder="Ex: Notebook Dell">
                </div>

                <div class="form-group">
                    <label for="categoria">Categoria:</label>
                    <select id="categoria" name="categoria" required>
                        <option value="" disabled selected>Selecione uma categoria...</option>
                        <option value="Eletrônicos">Eletrônicos</option>
                        <option value="Acessórios">Acessórios</option>
                        <option value="Periféricos">Periféricos</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição:</label>
                    <textarea id="descricao" name="descricao" rows="4" placeholder="Detalhes do produto..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Salvar Produto</button>
                    <a href="index.html" class="btn-cancel">Voltar para Lista</a>
                </div>
            </form>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Configura o interceptador de envio do formulário assim que a página carrega
        document.addEventListener('DOMContentLoaded', configurarFormulario);
    </script>
</body>

</html>
